<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 460" font-family="-apple-system,Segoe UI,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#0a0f1c"/>
    </linearGradient>
  </defs>
  <rect width="1100" height="460" fill="url(#bg)"/>

  <!-- Title -->
  <text x="40" y="40" font-size="16" font-weight="700" fill="#e2e8f0">RL Playground - Training curves on GridWorld 5x5</text>
  <text x="40" y="62" font-size="12" fill="#94a3b8">Episode return per agent (rolling mean over 25 episodes)</text>

  <!-- Plot frame -->
  <rect x="60" y="90" width="980" height="320" rx="8" fill="#111827" stroke="#1f2937"/>

  <!-- gridlines -->
  <g stroke="#1f2937" stroke-dasharray="3 4">
    <line x1="60"  y1="170" x2="1040" y2="170"/>
    <line x1="60"  y1="250" x2="1040" y2="250"/>
    <line x1="60"  y1="330" x2="1040" y2="330"/>
  </g>

  <!-- y-axis labels -->
  <g font-size="11" fill="#94a3b8">
    <text x="50" y="174" text-anchor="end">+1.0</text>
    <text x="50" y="254" text-anchor="end">+0.5</text>
    <text x="50" y="334" text-anchor="end"> 0.0</text>
    <text x="50" y="414" text-anchor="end">-0.5</text>
  </g>

  <!-- x-axis labels -->
  <g font-size="11" fill="#94a3b8" text-anchor="middle">
    <text x="60"   y="430">0</text>
    <text x="305"  y="430">125</text>
    <text x="550"  y="430">250</text>
    <text x="795"  y="430">375</text>
    <text x="1040" y="430">500</text>
    <text x="550"  y="450">episode</text>
  </g>

  <!-- Q-learning curve (cyan) -->
  <path d="M 60 410
           L 100 405 L 140 388 L 180 372 L 220 350 L 260 322 L 300 296 L 340 270 L 380 252
           L 420 232 L 460 220 L 500 210 L 540 200 L 580 192 L 620 188 L 660 184 L 700 180
           L 740 178 L 780 176 L 820 174 L 860 173 L 900 172 L 940 172 L 980 172 L 1040 172"
        fill="none" stroke="#22d3ee" stroke-width="2.5"/>

  <!-- DQN curve (violet) — slower start, similar plateau -->
  <path d="M 60 412
           L 100 410 L 140 408 L 180 402 L 220 392 L 260 378 L 300 358 L 340 332 L 380 308
           L 420 286 L 460 264 L 500 244 L 540 226 L 580 212 L 620 202 L 660 194 L 700 188
           L 740 184 L 780 180 L 820 178 L 860 176 L 900 174 L 940 174 L 980 173 L 1040 173"
        fill="none" stroke="#a78bfa" stroke-width="2.5"/>

  <!-- Legend -->
  <g font-size="12" fill="#cbd5e1">
    <rect x="820" y="106" width="200" height="50" rx="6" fill="#0f172a" stroke="#1f2937"/>
    <line  x1="836" y1="124" x2="864" y2="124" stroke="#22d3ee" stroke-width="3"/>
    <text  x="872" y="128">Q-learning (tabular)</text>
    <line  x1="836" y1="146" x2="864" y2="146" stroke="#a78bfa" stroke-width="3"/>
    <text  x="872" y="150">DQN (NumPy MLP)</text>
  </g>
</svg>
